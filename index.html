<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rifa Dia das Mães</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #F5E6DA;
      color: #333;
    }

    header {
      background-color: #FF2E8B;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    .card {
      background-color: #fff;
      border-radius: 15px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .titulo {
      color: #FF2E8B;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .descricao {
      color: #555;
      margin-bottom: 20px;
    }

    .botao {
      background-color: #FFC0CB;
      color: #333;
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: #FF2E8B;
      color: white;
    }

    footer {
      margin-top: 50px;
      background-color: #FF2E8B;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }

    footer a {
      color: #fff;
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <header>
    <h1>🎁 Rifa Especial Dia das Mães</h1>
  </header>

  <div class="container">
    <div class="card">
      <div class="titulo">Concorra a um super prêmio!</div>

      <div class="descricao">
        Participe da nossa rifa especial de Dia das Mães e tenha a chance de ganhar um presente incrível!
      </div>

      <button class="botao">Comprar Número</button>
    </div>
  </div>

  <footer>
    🔒 Site 100% SEGURO e protegido <br>
    Suporte 24h com o desenvolvedor 
    <strong>Dalton Neres</strong> - 
    <a href="https://linkneres.vercel.app/" target="_blank">
      https://linkneres.vercel.app/
    </a>
  </footer>

</body>
</html>
