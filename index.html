<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Rifa Dia das Mães</title>

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --rosa-choque: #FF2E8B;
      --rosa-choque-dark: #E02678;
      --rosa-claro: #FFC0CB;
      --rosa-suave: #FFE4EC;
      --bege-claro: #F5E6DA;
      --bege-escuro: #E8D5C4;
      --texto: #555555;
      --branco: #FFFFFF;
    }

    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: var(--bege-claro);
      color: var(--texto);
    }

    header {
      background-color: var(--rosa-choque);
      color: var(--branco);
      padding: 20px;
      text-align: center;
    }

    .container {
      padding: 30px;
      text-align: center;
    }

    .card {
      background-color: var(--branco);
      border-radius: 15px;
      padding: 20px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .titulo {
      color: var(--rosa-choque);
      font-size: 28px;
      margin-bottom: 10px;
    }

    .descricao {
      margin-bottom: 20px;
    }

    .botao {
      background-color: var(--rosa-claro);
      color: #333;
      border: none;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: 0.3s;
    }

    .botao:hover {
      background-color: var(--rosa-choque);
      color: var(--branco);
    }

    footer {
      margin-top: 50px;
      background-color: var(--rosa-choque);
      color: var(--branco);
      text-align: center;
      padding: 20px;
      font-size: 14px;
    }

    footer a {
      color: var(--branco);
      text-decoration: underline;
    }

    /* BOTÃO WHATSAPP */
    .whatsapp {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      color: white;
      padding: 15px 20px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 600;
      box-shadow: 0 5px 10px rgba(0,0,0,0.2);
      transition: 0.3s;
    }

    .whatsapp:hover {
      transform: scale(1.05);
    }
  </style>
</head>

<body>

  <header>
    <h1>🎁 Rifa Especial Dia das Mães</h1>
  </header>

  <div class="container">
    <div class="card">
      <div class="titulo">Concorra a um super prêmio!</div>

      <div class="descricao">
        Participe da nossa rifa especial de Dia das Mães e tenha a chance de ganhar um presente incrível!
      </div>

      <button class="botao">Comprar Número</button>
    </div>
  </div>

  <footer>
    🔒 Site 100% SEGURO e protegido <br>
    Suporte 24h com o desenvolvedor 
    <strong>Dalton Neres</strong> - 
    <a href="https://linkneres.vercel.app/" target="_blank">
      linkneres.vercel.app
    </a>
  </footer>

  <!-- BOTÃO WHATSAPP -->
  <a 
    class="whatsapp" 
    href="https://wa.me/5599999999999" 
    target="_blank"
  >
    💬 SUPORTE
  </a>

</body>
</html>
