<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Rifa</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: #FFF5F5;
    padding: 20px;
    margin: 0;
  }

  h1 { color: #E53935; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 15px;
    margin-bottom: 20px;
  }

  .card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.08);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
  }

  th, td {
    padding: 10px;
    border-bottom: 1px solid #eee;
    text-align: center;
  }

  th {
    background: #E53935;
    color: white;
  }

  .pago { color: #2e7d32; font-weight: bold; }
  .pendente { color: #fb8c00; font-weight: bold; }

  .numero {
    background: #FFC0CB;
    padding: 6px 10px;
    border-radius: 6px;
    margin: 4px;
    display: inline-block;
  }

  button {
    background: #E53935;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
  }

  button:hover {
    transform: scale(1.05);
    background: #C62828;
  }

  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, #1a0000, #000);
    color: white;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 9999;
    text-align: center;
  }

  #numeroAnimado {
    font-size: 90px;
    color: #FFC0CB;
  }

  #numeroFinal {
    font-size: 70px;
    color: #FFD700;
  }
</style>
</head>

<body>

<h1>📊 Painel da Rifa</h1>
<h3 id="boasVindas"></h3>

<div class="grid">
  <div class="card">
    💰 Total arrecadado<br>
    <strong id="total">R$ 0</strong>
  </div>

  <div class="card">
    📦 Total de pedidos<br>
    <strong id="pedidos">0</strong>
  </div>

  <div class="card">
    ⏳ Pendentes<br>
    <strong id="pendentes">0</strong>
  </div>

  <div class="card">
    🔢 Números vendidos<br>
    <strong id="numerosVendidos">0</strong>
  </div>
</div>

<div class="card" style="text-align:center;">
  <strong>🎟️ Números do sorteio</strong><br><br>

  <button onclick="abrirUltimos()">👀 Últimos números</button>

  <button onclick="gerarPDF()" style="margin-left:10px; background:#FF2E8B;">
    📄 Gerar PDF
  </button>
</div>

<h2>📋 Compras</h2>

<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>WhatsApp</th>
      <th>Números</th>
      <th>Qtd</th>
      <th>Total</th>
      <th>Status</th>
      <th>Data</th>
      <th>Hora</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<div class="card" style="text-align:center; margin-top:20px;">
  <button onclick="sortear()" style="background:#FF2E8B;">
    🎲 Realizar Sorteio
  </button>
</div>

<!-- 🎬 SORTEIO -->
<div id="overlay">
  <h1>🎉 Resultado</h1>

  <div id="numeroAnimado">0</div>

  <div id="resultadoFinal" style="display:none;">
    <h2>Número sorteado</h2>
    <h1 id="numeroFinal"></h1>

    <p id="nomeFinal"></p>
    <p id="telefoneFinal"></p>

    <button onclick="voltarPainel()">Voltar</button>
  </div>
</div>

<!-- 👀 POPUP -->
<div id="popupNumeros" style="
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="background:white; padding:20px; border-radius:10px; text-align:center;">
    <h3>Últimos números</h3>

    <div id="ultimosNumeros" style="margin:15px 0;"></div>

    <button onclick="fecharPopup()">Fechar</button>
  </div>

</div>

<!-- 🚪 SAIR -->
<button onclick="sair()" style="
  position:fixed;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:black;
">
🚪
</button>

<script type="module" src="admin.js"></script>

</body>
</html>
