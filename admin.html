<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Admin | Rifa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      font-size: 14px;
    }

    th, td {
      padding: 10px;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }

    th {
      background: #FF2E8B;
      color: white;
    }

    .pago {
      color: green;
      font-weight: bold;
    }

    .pendente {
      color: orange;
      font-weight: bold;
    }

    canvas {
      background: white;
      border-radius: 10px;
      padding: 10px;
    }

    .numero {
      background: #FFC0CB;
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: bold;
    }

    button {
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* 🎬 OVERLAY SORTEIO */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #000, #111);
      color: white;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 9999;
      text-align: center;
      padding: 20px;
    }

    #numeroAnimado {
      font-size: 90px;
      margin: 20px 0;
      color: #FFC0CB;
      font-weight: bold;
    }

    #numeroFinal {
      font-size: 70px;
      color: #FFD700;
      margin: 10px 0;
    }

    #resultadoFinal {
      animation: aparecer 0.6s ease;
    }

    @keyframes aparecer {
      from {opacity: 0; transform: scale(0.8);}
      to {opacity: 1; transform: scale(1);}
    }

    /* 📱 RESPONSIVO */
    @media (max-width: 600px) {

      h1 {
        font-size: 20px;
      }

      #numeroAnimado {
        font-size: 60px;
      }

      #numeroFinal {
        font-size: 50px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 6px;
      }
    }
  </style>
</head>

<body>

<h1 id="saudacao"></h1>
<h2>📊 Painel da Rifa</h2>
<h3 id="boasVindas"></h3>

<div class="grid">
  <div class="card">
    💰 Total arrecadado<br>
    <strong id="total">R$ 0</strong>
  </div>

  <div class="card">
    📦 Total de pedidos<br>
    <strong id="pedidos">0</strong>
  </div>

  <div class="card">
    ⏳ Pedidos pendentes<br>
    <strong id="pendentes">0</strong>
  </div>

  <div class="card">
    🔢 Números gerados<br>
    <strong id="numerosVendidos">0</strong>
  </div>
</div>

<div class="card" style="margin-top:15px; text-align:center;">
  <strong>🎟️ Números participantes do sorteio</strong><br><br>

  <button onclick="abrirUltimos()" style="
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#FFC0CB;
    cursor:pointer;
    font-weight:600;
  ">
    👀 Ver últimos números vendidos
  </button>

  <button onclick="gerarPDF()" style="
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#FF2E8B;
    color:white;
    cursor:pointer;
    font-weight:600;
    margin-left:10px;
  ">
    📄 Gerar lista completa (PDF)
  </button>
</div>

<h2>📋 Lista de Compras</h2>
<table>
  <thead>
    <tr>
      <th>Nome</th>
      <th>WhatsApp</th>
      <th>Números</th>
      <th>Qtd</th>
      <th>Total</th>
      <th>Status</th>
      <th>Data</th>
      <th>Hora</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<div class="card" style="margin-top:20px; text-align:center;">
  <button onclick="sortear()" style="
    background:#FF2E8B;
    color:white;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
  ">
    🎲 Realizar Sorteio
  </button>
</div>

<!-- 🎬 TELA DE SORTEIO -->
<div id="overlay">

  <h1>🎉 E o ganhador(a) é...</h1>

  <div id="numeroAnimado">0</div>

<div id="resultadoFinal" style="display:none;">
  <h2>🏆 Número sorteado:</h2>
  <h1 id="numeroFinal"></h1>

  <p id="nomeFinal"></p>
  <p id="telefoneFinal"></p>

  <button id="btnVoltar" onclick="voltarPainel()" style="
    display:none;
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:8px;
    background:#FF2E8B;
    color:white;
    font-weight:600;
    cursor:pointer;
  ">
    🔙 Voltar ao painel
  </button>
</div>

</div>

<div id="popupNumeros" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:9999;
">

  <div style="
    background:white;
    padding:25px;
    border-radius:12px;
    text-align:center;
    max-width:300px;
    width:90%;
  ">
    <h3>Últimos números vendidos</h3>

    <div id="ultimosNumeros" style="
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin:15px 0;
    "></div>

    <button onclick="fecharPopup()" style="
      padding:10px;
      border:none;
      background:#ccc;
      border-radius:8px;
      cursor:pointer;
    ">
      Fechar
    </button>
  </div>
</div>

<button onclick="sair()" style="
  position: fixed;
  top: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: none;
  background: #000;
  color: white;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  z-index: 9999;
">
  🚪
</button>

<script type="module" src="admin.js"></script>
</body>
</html>
