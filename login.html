<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Login | Rifa</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #FF2E8B, #FF6FB5);
      
      display: flex;
      align-items: center;
      justify-content: center;

      min-height: 100vh;
      padding: 15px;
    }

    .login-box {
      background: white;
      padding: 25px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
      
      width: 100%;
      max-width: 320px;
      text-align: center;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 18px;
      color: #333;
      font-weight: 600;
      line-height: 1.3;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      font-size: 16px; /* evita zoom no iPhone */
      transition: 0.2s;
      box-sizing: border-box;
    }

    input:focus {
      border-color: #FF2E8B;
      outline: none;
      box-shadow: 0 0 4px rgba(255,46,139,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      background: #FF2E8B;
      color: white;
      font-weight: 500;
      cursor: pointer;
      font-size: 15px;
      transition: 0.3s;
    }

    button:hover {
      background: #e0267a;
    }

    .link {
      margin-top: 12px;
      font-size: 12px;
    }

    .link a {
      color: #FF2E8B;
      text-decoration: none;
      font-weight: 500;
    }

    .link a:hover {
      text-decoration: underline;
    }

    /* 📱 Ajustes para telas pequenas */
    @media (max-width: 400px) {
      .login-box {
        padding: 20px 15px;
      }

      h2 {
        font-size: 16px;
      }

      button {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>🔐 Painel da Rifa | Acesso Administrativo</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="link">
      <a href="https://wa.me/5546999711937?text=Olá,%20esqueci%20minha%20senha%20do%20painel%20da%20rifa.%20Pode%20me%20ajudar?" target="_blank">
        Esqueci minha senha
      </a>
    </div>
  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
