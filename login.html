<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel Login | Rifa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    /* gradiente vermelho + rosa claro */
    background: linear-gradient(135deg, #E53935, #FFC0CB);

    display: flex;
    align-items: center;
    justify-content: center;

    min-height: 100vh;
    padding: 15px;
  }

  .login-box {
    background: white;
    padding: 25px 20px;
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    
    width: 100%;
    max-width: 320px;
    text-align: center;
  }

  h2 {
    margin-bottom: 18px;
    font-size: 18px;
    color: #444;
    font-weight: 600;
    line-height: 1.3;
  }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    transition: 0.2s;
    box-sizing: border-box;
  }

  input:focus {
    border-color: #E53935;
    outline: none;
    box-shadow: 0 0 6px rgba(229,57,53,0.3);
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;

    background: #E53935;
    color: white;

    font-weight: 600;
    cursor: pointer;
    font-size: 15px;
    transition: 0.3s;
  }

  button:hover {
    background: #C62828;
    transform: translateY(-1px);
  }

  .link {
    margin-top: 12px;
    font-size: 12px;
  }

  .link a {
    color: #E53935;
    text-decoration: none;
    font-weight: 500;
  }

  .link a:hover {
    text-decoration: underline;
  }

  /* 📱 Ajustes mobile */
  @media (max-width: 400px) {
    .login-box {
      padding: 20px 15px;
    }

    h2 {
      font-size: 16px;
    }

    button {
      font-size: 14px;
    }
  }
</style>
</head>

<body>

  <div class="login-box">
    <h2>🔐 Painel da Rifa | Acesso Administrativo</h2>

    <input id="email" placeholder="Email">
    <input id="senha" type="password" placeholder="Senha">

    <button onclick="login()">Entrar</button>

    <div class="link">
      <a href="https://wa.me/5546999711937?text=Olá,%20esqueci%20minha%20senha%20do%20painel%20da%20rifa.%20Pode%20me%20ajudar?" target="_blank">
        Esqueci minha senha
      </a>
    </div>
  </div>

  <script type="module" src="login.js"></script>

</body>
</html>
